name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type:bug", "priority:medium"]
assignees:
  - self
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Please fill out the sections below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Application version (e.g., v1.2.3)
      placeholder: v0.0.0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - backend
        - frontend
        - database
        - infra
        - auth
        - api
        - ci
        - docs
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this?
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this occur?
      options:
        - Alpha (local)
        - Beta (penguintech.cloud)
        - Production
        - Development (local)

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add screenshots or paste relevant log output

  - type: input
    id: license
    attributes:
      label: License Key (optional)
      description: If related to licensing, provide your license key prefix (PENG-XXXX)
      placeholder: PENG-XXXX
