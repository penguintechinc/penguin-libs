name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-react:
    name: Build & Test React Libs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'
      - run: npm ci
      - name: Build dependencies
        run: |
          npm run build -w @penguintechinc/react-form-builder
          npm run build -w @penguintechinc/react-login
          npm run build -w @penguintechinc/react-sidebar
          npm run build -w @penguintechinc/react-console-version
          npm run build -w @penguintechinc/react-hooks
      - name: Security
        run: npm audit --omit=dev
      - run: npm run build -w @penguintechinc/react-libs
      - run: npm run typecheck -w @penguintechinc/react-libs
      - run: npm run test -w @penguintechinc/react-libs

  build-react-aaa:
    name: Build & Test React AAA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build -w @penguintechinc/react-aaa
      - name: Typecheck
        run: npm run typecheck -w @penguintechinc/react-aaa
      - name: Lint
        run: npm run lint -w @penguintechinc/react-aaa
      - name: Test
        run: npm test -w @penguintechinc/react-aaa
      - name: Security
        run: npm audit --omit=dev

  build-python:
    name: Build & Test Python Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.13'
      - run: pip install build pytest pytest-asyncio requests bandit pip-audit
      - run: |
          pip install -e "packages/python-crypto"
          pip install -e "packages/python-security"
          pip install -e "packages/python-http"
          pip install -e "packages/python-libs[all,dev]"
      - run: pytest packages/python-libs/tests -v
      - run: pip install -e "packages/python-licensing[dev]"
      - run: pytest packages/python-licensing/tests -v
      - run: cd packages/python-secrets && pip install -e ".[dev]" && pytest tests -v
      - name: Lint - python-utils
        run: cd packages/python-utils && ruff check src/ tests/
      - name: Security - bandit
        run: cd packages/python-utils && bandit -r src/ -c pyproject.toml
      - name: Security - pip-audit
        run: cd packages/python-utils && pip-audit --ignore-vuln CVE-2026-3219

  build-python-aaa:
    name: Build & Test Python AAA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.13'
      - name: Install
        run: cd packages/python-aaa && pip install -e ".[dev]"
      - name: Lint
        run: cd packages/python-aaa && ruff check src/ tests/
      - name: Format check
        run: cd packages/python-aaa && ruff format --check src/ tests/
      - name: Type check
        run: cd packages/python-aaa && mypy src/
      - name: Security - bandit
        run: cd packages/python-aaa && bandit -r src/ -c pyproject.toml
      - name: Security - pip-audit
        run: cd packages/python-aaa && pip-audit
      - name: Test
        run: cd packages/python-aaa && pytest tests/ -v --tb=short --cov=penguin_aaa

  build-go:
    name: Build & Test Go Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.25'
      - run: go test ./...
        working-directory: packages/go-common
      - run: go mod download
        working-directory: packages/go-h3
      - run: go test -race ./...
        working-directory: packages/go-h3
      - name: Lint - go-common
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
        with:
          working-directory: packages/go-common
      - name: Security - govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd packages/go-common && govulncheck ./...
      - name: Security - gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd packages/go-common && gosec -quiet ./...

  build-go-aaa:
    name: Build & Test Go AAA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.25'
      - name: Build
        run: cd packages/go-aaa && go build ./...
      - name: Vet
        run: cd packages/go-aaa && go vet ./...
      - name: Test
        run: cd packages/go-aaa && go test -race -v ./...
      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9
        with:
          working-directory: packages/go-aaa
      - name: Security - govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd packages/go-aaa && govulncheck ./...
      - name: Security - gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd packages/go-aaa && gosec -quiet ./...

  build-react-testutils:
    name: Build & Test react-testutils
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build (typecheck)
        run: npm run build -w @penguintechinc/react-testutils
      - name: Typecheck
        run: npm run typecheck -w @penguintechinc/react-testutils
      - name: Test
        run: npm run test -w @penguintechinc/react-testutils
      - name: Security
        run: npm audit --omit=dev

  build-flutter:
    name: Build Flutter Libs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/flutter_libs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-penguin-pytest:
    name: Build & Test penguin-pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.13'
      - name: Install
        run: pip install -e "packages/python-pytest[dev]"
      - name: Lint
        run: cd packages/python-pytest && ruff check src/ tests/
      - name: Format check
        run: cd packages/python-pytest && ruff format --check src/ tests/
      - name: Type check
        run: cd packages/python-pytest && mypy src/
      - name: Security - bandit
        run: cd packages/python-pytest && bandit -r src/ -c pyproject.toml
      - name: Test
        run: cd packages/python-pytest && pytest tests/ -v --tb=short

  build-react-form-builder:
    name: Build & Test React Form Builder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build -w @penguintechinc/react-form-builder
      - name: Typecheck
        run: npm run typecheck -w @penguintechinc/react-form-builder
      - name: Test
        run: npm run test -w @penguintechinc/react-form-builder

  build-react-login:
    name: Build & Test React Login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build -w @penguintechinc/react-login
      - name: Typecheck
        run: npm run typecheck -w @penguintechinc/react-login
      - name: Test
        run: npm run test -w @penguintechinc/react-login

  build-react-sidebar:
    name: Build & Test React Sidebar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build -w @penguintechinc/react-sidebar
      - name: Typecheck
        run: npm run typecheck -w @penguintechinc/react-sidebar
      - name: Test
        run: npm run test -w @penguintechinc/react-sidebar

  build-react-console-version:
    name: Build & Test React Console Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build -w @penguintechinc/react-console-version
      - name: Typecheck
        run: npm run typecheck -w @penguintechinc/react-console-version
      - name: Test
        run: npm run test -w @penguintechinc/react-console-version

  build-react-hooks:
    name: Build & Test React Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Build react-form-builder dependency
        run: npm run build -w @penguintechinc/react-form-builder
      - name: Build
        run: npm run build -w @penguintechinc/react-hooks
      - name: Typecheck
        run: npm run typecheck -w @penguintechinc/react-hooks
      - name: Test
        run: npm run test -w @penguintechinc/react-hooks

  build-python-split:
    name: Build & Test Python Split Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.13'
      - name: Install split packages
        run: |
          pip install -e "packages/python-crypto[dev]" || pip install -e "packages/python-crypto"
          pip install -e "packages/python-security[dev]" || pip install -e "packages/python-security"
          pip install -e "packages/python-http[dev]" || pip install -e "packages/python-http"
      - name: Install transition library
        run: pip install -e "packages/python-libs[dev]"
      - name: Lint
        run: |
          cd packages/python-crypto && ruff check src/
          cd ../python-security && ruff check src/
          cd ../python-http && ruff check src/
      - name: Security - bandit
        run: |
          cd packages/python-crypto && bandit -r src/ -ll
          cd ../python-security && bandit -r src/ -ll
          cd ../python-http && bandit -r src/ -ll
      - name: Test transition library import
        run: python3 -c "import penguin_libs; from penguin_libs.validation import validate_string; print('Transition import OK')"

  build-go-split:
    name: Build & Test Go Split Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.24'
      - name: Test go-logging
        run: go test ./...
        working-directory: packages/go-logging
      - name: Build go-common (transition)
        run: go build ./...
        working-directory: packages/go-common
      - name: Build go-xdp
        run: go build ./...
        working-directory: packages/go-xdp
      - name: Build go-numa
        run: go build ./...
        working-directory: packages/go-numa
      - name: Vet go-logging
        run: go vet ./...
        working-directory: packages/go-logging
