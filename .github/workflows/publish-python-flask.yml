name: Publish penguin-flask

on:
  push:
    tags:
      - 'penguin-flask-v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish penguin-flask to PyPI
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.13'

      - name: Install build tools
        run: |
          python3 -m pip install --upgrade pip
          pip3 install build twine

      - name: Build package
        run: python3 -m build
        working-directory: packages/python-flask

      - name: Check package
        run: twine check dist/*
        working-directory: packages/python-flask

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: packages/python-flask/dist/

      - name: Create release summary
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: penguin-flask" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: PyPI (trusted publishing)" >> $GITHUB_STEP_SUMMARY
        working-directory: packages/python-flask
