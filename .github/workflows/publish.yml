  # React Login - npm
  # ============================================
  publish-react-login:
    name: Publish React Login
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.package == 'react-login' || github.event.inputs.package == 'all')) ||
      startsWith(github.ref, 'refs/tags/react-login-v')

    defaults:
