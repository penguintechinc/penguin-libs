name: Publish Packages

on:
  push:
    tags:
      - 'react-libs-v*'
      - 'react-aaa-v*'
      - 'react-testutils-v*'
      - 'penguin-libs-v*'
      - 'penguin-licensing-v*'
      - 'penguin-secrets-v*'
      - 'penguin-utils-v*'
      - 'penguin-aaa-v*'
      - 'penguin-dal-v*'
      - 'penguin-limiter-v*'
      - 'flutter-libs-v*'
      - 'go-aaa-v*'
      - 'penguin-pytest-v*'
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'react-libs'
        type: choice
        options:
          - react-libs
          - react-aaa
          - react-testutils
          - python-libs
          - python-licensing
          - python-secrets
          - python-utils
          - python-aaa
          - python-dal
          - python-pytest
          - python-email
          - python-limiter
          - flutter-libs
          - all

permissions:
  contents: read
  packages: write
  id-token: write  # For PyPI trusted publishing

jobs:
  # ============================================
  # React Libraries - GitHub Packages (npm)
  # ============================================
  publish-react-libs:
    name: Publish React Libraries
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.package == 'react-libs' || github.event.inputs.package == 'all') ||
      startsWith(github.ref, 'refs/tags/react-libs-v') ||
      startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: packages/react-libs

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@penguintechinc'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build package
        run: npm run build

      - name: Run type check
        run: npm run typecheck

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release summary
        run: |
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: @penguintechinc/react-libs" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: npm (public)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Python Libs - PyPI
  # ============================================
  publish-python-libs:
    name: Publish Python Libs
    runs-on: ubuntu-latest
    environment: pypi
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.package == 'python-libs' || github.event.inputs.package == 'all') ||
      startsWith(github.ref, 'refs/tags/penguin-libs-v') ||
      startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: packages/python-libs

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          packages-dir: packages/python-libs/dist/

      - name: Create release summary
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: penguin-libs" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: PyPI (trusted publishing)" >> $GITHUB_STEP_SUMMARY

