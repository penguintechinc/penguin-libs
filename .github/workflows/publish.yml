        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          packages-dir: packages/python-email/dist/

      - name: Create release summary
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: penguin-email" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: PyPI (trusted publishing)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Python Limiter (penguin-limiter) - PyPI
  # ============================================
  publish-python-limiter:
    name: Publish penguin-limiter
    runs-on: ubuntu-latest
    environment: py-limiter
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.package == 'python-limiter' || github.event.inputs.package == 'all') ||
      startsWith(github.ref, 'refs/tags/penguin-limiter-v') ||
      startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: packages/python-limiter

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          packages-dir: packages/python-limiter/dist/

      - name: Create release summary
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: penguin-limiter" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: PyPI (trusted publishing)" >> $GITHUB_STEP_SUMMARY
