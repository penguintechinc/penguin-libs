          echo "**Registry**: PyPI (trusted publishing)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Go Common - No publish needed (go get from repo)
  # ============================================
  validate-go-common:
    name: Validate Go Common
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/')

    defaults:
      run:
        working-directory: packages/go-common

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test go-common
        run: go test ./...

      - name: Download go-h3 dependencies
        run: go mod download
        working-directory: packages/go-h3

      - name: Test go-h3
        run: go test -race ./...
        working-directory: packages/go-h3

      - name: Create release summary
        run: |
          echo "## Go Modules Validated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**go-common**: Ready for use via \`go get\`" >> $GITHUB_STEP_SUMMARY
          echo "**go-h3**: Ready for use via \`go get\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Flutter Libraries - pub.dev (dry-run)
  # ============================================
  publish-flutter-libs:
    name: Publish Flutter Libraries
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.package == 'flutter-libs' || github.event.inputs.package == 'all') ||
      startsWith(github.ref, 'refs/tags/flutter-libs-v') ||
      startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: packages/flutter_libs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2  # v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Dry run publish
        run: dart pub publish --dry-run

      - name: Create release summary
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: flutter_libs" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: pub.dev (dry-run)" >> $GITHUB_STEP_SUMMARY

  # ============================================
