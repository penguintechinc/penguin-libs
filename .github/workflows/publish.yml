name: Publish Packages

on:
  push:
    tags:
      - 'react-libs-v*'
      - 'react-aaa-v*'
      - 'react-testutils-v*'
      - 'react-form-builder-v*'
      - 'react-login-v*'
      - 'react-sidebar-v*'
      - 'react-console-version-v*'
      - 'react-hooks-v*'
      - 'penguin-libs-v*'
      - 'penguin-licensing-v*'
      - 'penguin-secrets-v*'
      - 'penguin-utils-v*'
      - 'penguin-aaa-v*'
      - 'penguin-dal-v*'
      - 'penguin-limiter-v*'
      - 'flutter-libs-v*'
      - 'go-aaa-v*'
      - 'go-logging-v*'
      - 'go-xdp-v*'
      - 'go-numa-v*'
      - 'penguin-pytest-v*'
      - 'v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'react-libs'
        type: choice
        options:
          - react-libs
          - react-aaa
          - react-testutils
          - react-form-builder
          - react-login
          - react-sidebar
          - react-console-version
          - react-hooks
          - python-libs
          - python-licensing
          - python-secrets
          - python-utils
          - python-aaa
          - python-dal
          - python-pytest
          - python-email
          - python-limiter
          - flutter-libs
          - all

permissions:
  contents: read
  packages: write
  id-token: write  # For PyPI trusted publishing

jobs:
  # ============================================
  # React Libraries - GitHub Packages (npm)
  # ============================================
  publish-react-libs:
    name: Publish React Libraries
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.package == 'react-libs' || github.event.inputs.package == 'all') ||
      startsWith(github.ref, 'refs/tags/react-libs-v') ||
      startsWith(github.ref, 'refs/tags/v')

    defaults:
      run:
        working-directory: packages/react-libs

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@penguintechinc'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build package
        run: npm run build

      - name: Run type check
        run: npm run typecheck

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release summary
        run: |
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: @penguintechinc/react-libs" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: npm (public)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # React Form Builder - npm
  # ============================================
  publish-react-form-builder:
    name: Publish React Form Builder
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.package == 'react-form-builder' || github.event.inputs.package == 'all')) ||
      startsWith(github.ref, 'refs/tags/react-form-builder-v')

    defaults:
      run:
        working-directory: packages/react-form-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@penguintechinc'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build package
        run: npm run build

      - name: Run type check
        run: npm run typecheck

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release summary
        run: |
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: @penguintechinc/react-form-builder" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: npm (public)" >> $GITHUB_STEP_SUMMARY

