        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@penguintechinc'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build package
        run: npm run build

      - name: Run type check
        run: npm run typecheck

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release summary
        run: |
          echo "## Published Package" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: @penguintechinc/react-sidebar" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: npm (public)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # React Console Version - npm
  # ============================================
  publish-react-console-version:
    name: Publish React Console Version
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.package == 'react-console-version' || github.event.inputs.package == 'all')) ||
