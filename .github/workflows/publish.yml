          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test go-common
        run: go test ./...

      - name: Download go-h3 dependencies
        run: go mod download
