[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "penguin-h3"
version = "0.1.0"
description = "PenguinTech HTTP/3 QUIC utilities"
readme = "README.md"
license = {text = "AGPL-3.0"}
requires-python = ">=3.13"
authors = [{name = "Penguin Tech Inc", email = "dev@penguintech.io"}]
keywords = ["penguintech", "h3", "http3", "quic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "aioquic>=1.3.0",
    "hypercorn[h3]>=0.17.0",
    "httpx>=0.27.0",
    "quart>=0.19.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
disallow_untyped_defs = true
