[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "penguin-limiter"
version = "0.1.0"
description = "Pluggable rate limiting for REST, gRPC, and H3 — with automatic private-IP bypass"
readme = "README.md"
license = { text = "AGPL-3.0" }
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
redis = ["redis>=5.0"]
grpc = ["grpcio>=1.60"]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "fakeredis>=2.20",
    "ruff>=0.4",
    "mypy>=1.9",
    "bandit>=1.7",
    "grpcio>=1.60",
    "redis>=5.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]
ignore = ["S101"]

[tool.mypy]
python_version = "3.13"
strict = true
ignore_missing_imports = true

[tool.bandit]
skips = ["B101"]
