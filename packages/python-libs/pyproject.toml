[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "penguin-libs"
version = "0.3.0"
description = "Shared Python libraries for Penguin Tech applications (transition library)"
readme = "README.md"
license = {text = "AGPL-3.0"}
requires-python = ">=3.13"
authors = [
    {name = "Penguin Tech Inc", email = "dev@penguintech.io"}
]
keywords = ["penguintech", "validation", "grpc", "pydantic", "utilities"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
split = [
    "penguin-crypto>=0.1.0",
    "penguin-flask>=0.1.0",
    "penguin-grpc>=0.1.0",
    "penguin-h3>=0.1.0",
    "penguin-http>=0.1.0",
    "penguin-pydantic>=0.1.0",
    "penguin-security>=0.1.0",
    "penguin-validation>=0.1.0",
]
all = [
    "penguin-crypto>=0.1.0",
    "penguin-flask>=0.1.0",
    "penguin-grpc>=0.1.0",
    "penguin-h3>=0.1.0",
    "penguin-http>=0.1.0",
    "penguin-pydantic>=0.1.0",
    "penguin-security>=0.1.0",
    "penguin-validation>=0.1.0",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0",
    "ruff>=0.1.0",
    "mypy>=1.0",
    "httpx>=0.27.0",
    "flask>=3.0",
    "flask-restx>=1.0",
]

[project.urls]
Homepage = "https://www.penguintech.io"
Repository = "https://github.com/penguintechinc/penguin-libs"
Issues = "https://github.com/penguintechinc/penguin-libs/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ['py311', 'py312', 'py313']

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
