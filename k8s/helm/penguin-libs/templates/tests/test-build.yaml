apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "penguin-libs.fullname" . }}-build-test
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "penguin-libs.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "penguin-libs.selectorLabels" . | nindent 8 }}
        job-type: build-test
    spec:
      restartPolicy: Never
      {{- if .Values.buildValidator.enabled }}
      containers:
      - name: build-validator
        image: "{{ .Values.buildValidator.image.repository }}:{{ .Values.buildValidator.image.tag }}"
        imagePullPolicy: {{ .Values.buildValidator.image.pullPolicy }}
        env:
        - name: NODE_ENV
          value: {{ .Values.config.nodeEnv | quote }}
        - name: NPM_REGISTRY
          value: {{ .Values.config.npmRegistry | quote }}
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Starting NPM package validation..."
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo ""
          echo "Checking registry connectivity..."
          npm ping --registry "$NPM_REGISTRY" || echo "Registry ping not supported, continuing..."
          echo ""
          echo "Validating @penguintechinc/react-libs installability..."
          npm info @penguintechinc/react-libs version 2>/dev/null && \
            npm install --no-save @penguintechinc/react-libs || \
            echo "Package not yet published to registry, skipping install test"
          echo ""
          echo "Build and publish validation completed successfully"
          exit 0
        resources:
          {{- toYaml .Values.buildValidator.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
      {{- end }}
